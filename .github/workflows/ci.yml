name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # No dependencies to install — the engine is zero-dependency.
      # LuaLaTeX integration tests skip themselves when TeX is absent,
      # so this exercises the internal engine end to end.
      - run: npm test
