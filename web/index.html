<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TDOM Engine</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header id="topbar">
  <div class="brand">
    <span class="logo">Ψ</span>
    <span class="name">TDOM Engine</span>
  </div>
  <div class="status" id="status"></div>
  <div class="actions">
    <select id="layout-view" title="表示するペイン">
      <option value="both" selected>両方表示</option>
      <option value="workspace">エディタのみ</option>
      <option value="preview">プレビューのみ</option>
    </select>
    <select id="tpl-select" title="テンプレートから新規作成">
      <option value="">テンプレート</option>
    </select>
    <button id="btn-pdf" title="ソースを lualatex でフルコンパイルして PDF を開く">PDF</button>
    <button id="btn-compare" title="本物のPDF (lualatex→pdf.js) と擬似PDFを別ページで並べて比較">比較</button>
    <button id="btn-reset" title="サンプル文書に戻す">リセット</button>
  </div>
</header>

<main id="layout">
  <section id="workspace-pane">
    <div class="code-editor-pane">
      <div class="code-editor-head">
        <span>main.tex</span>
        <span>LuaLaTeX</span>
      </div>
      <div class="code-editor-shell">
        <pre id="editor-highlight" aria-hidden="true"></pre>
        <textarea id="editor" spellcheck="false" autocomplete="off"></textarea>
      </div>
    </div>
  </section>

  <div id="workspace-preview-splitter" role="separator" aria-orientation="vertical" aria-valuemin="35" aria-valuemax="70" aria-valuenow="48" tabindex="0" title="ドラッグしてエディタとプレビューの比率を変更"></div>

  <section id="preview-pane">
    <div class="pane-title">Preview <span class="hint">パッチされたページだけが光ります</span>
      <span class="zoomctl">
        <button id="zoom-out" title="縮小 (⌘/Ctrl+ホイールでも)">−</button>
        <span id="zoom-level">100%</span>
        <button id="zoom-in" title="拡大 (⌘/Ctrl+ホイールでも)">＋</button>
        <button id="zoom-fit" title="幅に合わせる">合わせる</button>
      </span>
    </div>
    <div id="pages"></div>
  </section>

  <aside id="inspector-pane">
    <div id="insp-reopen" title="インスペクタを表示">⟨</div>
    <div class="pane-title">Engine Inspector
      <button id="insp-toggle" title="インスペクタを隠してプレビューを拡大">⟩⟩ 隠す</button>
    </div>
    <div id="inspector">
      <div class="empty">まだ編集がありません</div>
    </div>
  </aside>
</main>

<script src="/app.js"></script>
</body>
</html>
